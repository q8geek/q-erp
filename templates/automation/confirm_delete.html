{% extends "base.html" %}
{% block content %}
<h1>Delete rule: {{ object }}?</h1>
<form method="post" class="card">{% csrf_token %}
  <button class="btn danger" type="submit">Delete</button>
  <a class="btn secondary" href="{% url 'automation:rule_list' tenant_slug=tenant.slug %}">Cancel</a>
</form>
{% endblock %}
