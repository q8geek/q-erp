{% extends "base.html" %}
{% block content %}
<h1>New Message</h1>
<form method="post" class="card">{% csrf_token %}
  {{ form.as_p }}
  <button class="btn" type="submit">Send</button>
  <a class="btn secondary" href="{% url 'messaging:inbox' tenant_slug=tenant.slug %}">Cancel</a>
</form>
{% endblock %}
