{% extends "base.html" %}
{% block content %}
<h1>Delete {{ object }}?</h1>
<form method="post" class="card">
  {% csrf_token %}
  <p>This cannot be undone.</p>
  <button class="btn danger" type="submit">Delete</button>
  <a class="btn secondary" href="{% url config.url_namespace|add:":"|add:model_name|add:"_list" tenant_slug=tenant.slug %}">Cancel</a>
</form>
{% endblock %}
