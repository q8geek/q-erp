{% extends "base.html" %}
{% block content %}
<h1>{% if instance %}Edit{% else %}New{% endif %} {{ verbose_name }}</h1>

<form method="post" enctype="multipart/form-data" class="card">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn" type="submit">Save</button>
  <a class="btn secondary" href="{% url config.url_namespace|add:":"|add:model_name|add:"_list" tenant_slug=tenant.slug %}">Cancel</a>
</form>
{% endblock %}
