<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Login · Q-ERP</title>
<style>
  body { font-family: sans-serif; background: #f6f8fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); width: 360px; }
  h1 { margin-top: 0; }
  input { width: 100%; padding: .5rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: .75rem; box-sizing: border-box; }
  button { width: 100%; padding: .6rem; background: #1f6feb; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  .errornote, .errorlist li { color: #b91c1c; }
</style></head>
<body>
  <div class="card">
    <h1>Q-ERP</h1>
    {% if form.errors %}<p style="color:#b91c1c;">Invalid credentials.</p>{% endif %}
    <form method="post">{% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
  </div>
</body></html>
