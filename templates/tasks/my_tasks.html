{% extends "base.html" %}
{% block content %}
<h1>My Open Tasks</h1>
<table>
  <thead><tr><th>Title</th><th>Project</th><th>Priority</th><th>Status</th><th>Due</th><th></th></tr></thead>
  <tbody>
    {% for t in tasks %}
    <tr>
      <td>{{ t.title }}</td>
      <td>{{ t.project|default:"-" }}</td>
      <td>{{ t.get_priority_display }}</td>
      <td>{{ t.get_status_display }}</td>
      <td>{{ t.due_date|default:"-" }}</td>
      <td><a class="btn small" href="{% url 'tasks:task_edit' tenant_slug=tenant.slug pk=t.pk %}">edit</a></td>
    </tr>
    {% empty %}<tr><td colspan="6" class="muted">No open tasks.</td></tr>{% endfor %}
  </tbody>
</table>
{% endblock %}
