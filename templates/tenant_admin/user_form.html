{% extends "base.html" %}
{% block content %}
<h1>{% if instance %}Edit{% else %}New{% endif %} User</h1>
<form method="post" class="card">{% csrf_token %}
  {{ form.as_p }}
  <button class="btn" type="submit">Save</button>
  <a class="btn secondary" href="{% url 'tenant_admin:user_list' tenant_slug=tenant.slug %}">Cancel</a>
</form>
{% endblock %}
